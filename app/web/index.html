<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InsurFlow AI Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #2563eb;
        --success: #16a34a;
        --warn: #ea580c;
        --danger: #dc2626;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.45;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
        margin-bottom: 24px;
      }
      header .inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 20px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }
      header h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      header .sub {
        margin: 6px 0 0;
        font-size: 0.8rem;
        color: var(--muted);
      }
      header .sub a {
        color: var(--accent);
        text-decoration: none;
      }
      header .sub a:hover {
        text-decoration: underline;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        padding: 8px 14px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .banner {
        display: none;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 0.875rem;
        border: 1px solid var(--border);
        background: #ecfdf5;
        color: #14532d;
      }
      .banner.show {
        display: block;
      }
      .banner.error {
        background: #fef2f2;
        color: #991b1b;
      }
      .loading-row {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        color: var(--muted);
        font-size: 0.875rem;
      }
      .loading-row.show {
        display: flex;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .muted {
        color: var(--muted);
        font-size: 0.8rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        vertical-align: top;
        text-align: left;
      }
      th {
        background: #f1f5f9;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        font-weight: 600;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .claim-id {
        font-weight: 600;
        color: var(--text);
      }
      .preview {
        margin-top: 6px;
        max-width: 360px;
        color: var(--muted);
        font-size: 0.8rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .score-pill {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .score-low {
        background: #dcfce7;
        color: var(--success);
      }
      .score-mid {
        background: #ffedd5;
        color: var(--warn);
      }
      .score-high {
        background: #fee2e2;
        color: var(--danger);
      }
      .decision {
        font-weight: 600;
        font-size: 0.85rem;
      }
      .decision.approved {
        color: var(--success);
      }
      .decision.rejected {
        color: var(--danger);
      }
      .decision.investigate {
        color: var(--warn);
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.75rem;
        border: 1px solid var(--border);
      }
      .pill.hitl {
        background: #fff7ed;
        border-color: #fdba74;
      }
      .pill.ok {
        background: #ecfdf5;
        border-color: #6ee7b7;
      }
      .review-status {
        font-size: 0.8rem;
      }
      .review-status.done {
        color: var(--success);
      }
      .cell-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .explanation {
        margin-top: 10px;
        padding: 10px 12px;
        background: #f8fafc;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 0.8rem;
        white-space: pre-wrap;
        max-width: 520px;
      }
      details.explain-details {
        margin-top: 8px;
      }
      details.explain-details summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 0.8rem;
        user-select: none;
      }
      details.explain-details summary:hover {
        text-decoration: underline;
      }
      .entities {
        margin-top: 6px;
        font-size: 0.75rem;
        color: var(--muted);
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="inner">
        <div>
          <h1>InsurFlow AI Dashboard</h1>
          <p class="sub">Local MVP · <a href="/docs">API docs</a> · <code>/ui</code></p>
        </div>
        <div class="toolbar">
          <button type="button" class="primary" id="refreshBtn">Refresh</button>
        </div>
      </div>
    </header>

    <div class="container">
      <div id="toast" class="banner" role="status"></div>
      <div id="loading" class="loading-row" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <span>Loading claims…</span>
      </div>
      <div id="status" class="muted" style="margin-bottom: 12px"></div>

      <table>
        <thead>
          <tr>
            <th>Claim</th>
            <th>Fraud</th>
            <th>Decision</th>
            <th>Confidence</th>
            <th>Review</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
